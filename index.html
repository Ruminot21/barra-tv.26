<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuraTV Overlay Responsive</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:transparent;
}

/* LOGO RESPONSIVE */
.logo{
position:absolute;
top:2vh;
right:2vw;
height:clamp(90px, 10vh, 140px);
}

/* NOMBRE CANAL */
.channel-name{
position:absolute;
bottom:10vh;
left:2vw;
font-size:clamp(20px, 3vw, 50px);
font-weight:bold;
background:linear-gradient(90deg,#00f0ff,#a100ff);
-webkit-background-clip:text;
color:transparent;
}

/* RELOJ + TEMP */
.clock{
position:absolute;
bottom:10vh;
right:2vw;
font-size:clamp(16px, 2vw, 32px);
color:#00f0ff;
font-weight:bold;
display:flex;
align-items:center;
gap:1vw;
}

/* ===== CINTA MUSICAL RESPONSIVE ===== */

.ticker-container{
position:absolute;
bottom:0;
width:100%;
height:clamp(40px, 6vh, 80px);
background:linear-gradient(90deg,#1a0033,#002b5c,#1a0033);
display:flex;
align-items:center;
overflow:hidden;
border-top:0.4vh solid #00f0ff;
box-shadow:0 0 2vh #00f0ff;
}

.ticker{
white-space:nowrap;
color:white;
font-size:clamp(14px, 1.8vw, 28px);
font-weight:bold;
letter-spacing:0.2vw;
animation:scroll 18s linear infinite;
position:relative;
}

@keyframes scroll{
0% { transform: translateX(100%); }
100% { transform: translateX(-100%); }
}

/* EFECTO BRILLO */
.ticker::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:40%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:shine 4s infinite;
}

@keyframes shine{
0%{ left:-100%; }
100%{ left:150%; }
}
</style>
</head>

<body>

<img src="https://i.postimg.cc/VNhjTb4d/3dgifmaker92299.gif" class="logo">

<div class="channel-name">CuraTV</div>

<div class="clock">
  <span id="time"></span>
  <span id="temp"> --°C</span>
</div>

<div class="ticker-container">
  <div class="ticker">
    🎵 La Pica de Rosita Con los desayunos desde las 5:30 de la mañana hasta las 12:30 de la tarde y después colaciones hasta las 14:30 
  </div>
</div>

<script>
/* RELOJ */
function updateClock(){
  const now = new Date();
  document.getElementById("time").innerText = now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* TEMPERATURA */
const apiKey = "08956bbc1467eae311c7eea17b034270";
const city = "Curacavi,CL";

async function updateWeather(){
  try{
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=es&appid=${apiKey}`);
    const data = await res.json();
    const temp = Math.round(data.main.temp);
    document.getElementById("temp").innerText = ` ${temp}°C`;
  }catch(e){
    document.getElementById("temp").innerText = " --°C";
  }
}

updateWeather();
setInterval(updateWeather,600000);
</script>

</body>
</html>
