<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>CuraTV Overlay PRO</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:transparent;
}

/* RECUADRO PRINCIPAL (CuraTV + Hora + Temp) */
.info-box{
position:absolute;
bottom:12vh;
left:3vw;
display:flex;
align-items:center;
gap:25px;

padding:18px 35px;
border-radius:25px;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:2px solid rgba(0,240,255,0.7);
box-shadow:0 0 25px rgba(0,240,255,0.8);

animation:glow 2s infinite alternate;
}

/* TEXTO CANAL */
.channel-name{
font-size:clamp(30px, 3vw, 55px);
font-weight:bold;
background:linear-gradient(90deg,#00f0ff,#a100ff);
-webkit-background-clip:text;
color:transparent;
}

/* RELOJ */
.clock{
display:flex;
align-items:center;
gap:15px;
font-size:clamp(22px, 2vw, 36px);
color:white;
font-weight:bold;
}

/* EFECTO BRILLO */
@keyframes glow{
from{ box-shadow:0 0 15px rgba(0,240,255,0.5); }
to{ box-shadow:0 0 35px rgba(0,240,255,1); }
}

/* ICONO CLIMA */
.weather-icon{
font-size:28px;
}

/* CINTA MUSICAL */
.ticker-container{
position:absolute;
bottom:0;
width:100%;
height:70px;
background:linear-gradient(90deg,#1a0033,#002b5c,#1a0033);
display:flex;
align-items:center;
overflow:hidden;
border-top:4px solid #00f0ff;
box-shadow:0 0 20px #00f0ff;
}

.ticker{
white-space:nowrap;
color:white;
font-size:44px;
font-weight:bold;
letter-spacing:2px;
animation:scroll 25s linear infinite;
position:relative;
}

@keyframes scroll{
0% { transform: translateX(100%); }
100% { transform: translateX(-100%); }
}

.ticker::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:40%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:shine 5s infinite;
}

@keyframes shine{
0%{ left:-100%; }
100%{ left:150%; }
}
</style>
</head>

<body>

<div class="info-box">
  <div class="channel-name">CuraTV</div>

  <div class="clock">
    <span id="time"></span>
    <span class="weather-icon" id="icon">☀️</span>
    <span id="temp"> --°C</span>
  </div>
</div>

<div class="ticker-container">
  <div class="ticker">
    🎵 La Pica de Rosita • Desayunos 5:30 AM a 12:30 PM • Colaciones hasta las 14:30 • ¡Te esperamos!
  </div>
</div>

<script>
function updateClock(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString('es-CL', { hour12:false });
}
setInterval(updateClock,1000);
updateClock();

const apiKey = "08956bbc1467eae311c7eea17b034270";
const city = "Curacavi,CL";

async function updateWeather(){
  try{
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=es&appid=${apiKey}`);
    const data = await res.json();
    const temp = Math.round(data.main.temp);
    const weather = data.weather[0].main;

    document.getElementById("temp").innerText = ` ${temp}°C`;

    let icon = "☀️";
    if(weather.includes("Cloud")) icon="☁️";
    if(weather.includes("Rain")) icon="🌧️";
    if(weather.includes("Thunder")) icon="⛈️";
    if(weather.includes("Snow")) icon="❄️";

    document.getElementById("icon").innerText = icon;

  }catch(e){
    document.getElementById("temp").innerText=" --°C";
  }
}

updateWeather();
setInterval(updateWeather,600000);
</script>

</body>
</html>
